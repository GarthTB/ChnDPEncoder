# 示例配置：按需修改后，保存为程序目录下的'Config.toml'，作为输入参数

# 键对开销表路径
cost_map = "CostMap.tsv"

# RIME词库路径
rime_dict = "RIME.dict.yaml"

# 待编码文本路径
texts = ["Text.txt"]

# 是否自动上屏（无需空格）
auto_commit = true

# 键盘布局：各行各指键值
layout = [
    "1234567890-=", # 数字
    "qwertyuiop[]", # 上排
    "asdfghjkl;'", # 中排
    "zxcvbnm,./", # 下排
    " ", # 空格
    "1qaz", # 左小指
    "2wsx", # 左无名指
    "3edc", # 左中指
    "4rfv5tgb", # 左食指
    "6yhn7ujm", # 右食指
    "8ik,", # 右中指
    "9ol.", # 右无名指
    "0p;/-['=]", # 右小指
    " " # 拇指
]
